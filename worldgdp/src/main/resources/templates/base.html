<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:fragment="layout(content)">
<head>
<meta charset="UTF-8" />
<title th:text="${title}">Title</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
	rel="stylesheet">

</head>
<body>
	<!---------- Navigation Bar ----------->

	<nav class="navbar navbar-light bg-light">
		<div class="container-fluid">
			<a th:href="@{/countries}" class="navbar-brand">Country GDP</a>
			<div class="d-flex">
				<h1 class="navbar-brand" th:if="${count != null}" th:text="${count + ' : Countries'}">Country Count</h1>
				<h1 class="navbar-brand" th:if="${country != null}" th:text="${'Country : '+country.name}">Countries</h1>
			</div>
		</div>
	</nav>

	<main class="container mt-4" th:replace="${content}"></main>



	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
		crossorigin="anonymous"></script>
</body>
</html>
